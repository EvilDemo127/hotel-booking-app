services:
  - type: web
    name: hotel-booking-app
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev
      npm install
      npm run build
      php artisan migrate --force
    startCommand: vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: BUILD_DIR
        value: .